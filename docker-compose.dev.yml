services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartfiles
    volumes:
      # 使用 bind mount 将数据保存到宿主机，dev 和生产可共享
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/smartfiles?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me-in-production}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      UPLOAD_ROOT: /data/storage
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-52428800000}
      NEXT_TELEMETRY_DISABLED: 1
      # 启用 Next.js 快速刷新 (Fast Refresh)
      FAST_REFRESH: "true"
      # Watcher 轮询模式，在 Docker 中更可靠
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # 挂载源代码，实现热重载
      - .:/app
      # 使用匿名卷保留 node_modules，避免被宿主机覆盖
      - /app/node_modules
      # 上传文件使用 bind mount，dev 和生产可共享
      # 使用 ./data/storage 与本地 npm run dev 保持一致
      - ./data/storage:/data/storage
    depends_on:
      db:
        condition: service_healthy
    # 增加内存限制，避免开发时内存不足
    deploy:
      resources:
        limits:
          memory: 4G

