services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartfiles
    volumes:
      # 使用 bind mount 将数据保存到宿主机，便于备份和迁移
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/smartfiles?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-change-me-generate-a-long-random-string-for-production}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      UPLOAD_ROOT: /data/storage
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-52428800000}
    volumes:
      # 上传文件使用 bind mount，便于备份和迁移
      # 使用 ./data/storage 与本地 npm run dev 保持一致
      - ./data/storage:/data/storage
    depends_on:
      db:
        condition: service_healthy

