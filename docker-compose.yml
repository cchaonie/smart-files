services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartfiles
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/smartfiles?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-change-me-generate-a-long-random-string-for-production}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      UPLOAD_ROOT: /data/storage
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-524288000}
    volumes:
      - upload_data:/data/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  upload_data:
