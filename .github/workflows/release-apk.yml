name: Build and Release Android APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to build (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref_name }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        working-directory: packages/mobile
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          chmod 600 release.keystore

      - name: Prebuild Android project
        working-directory: packages/mobile
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_BUILD: 'true'
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          ANDROID_KEYSTORE_PATH: 'release.keystore'
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npx expo prebuild --platform android --clean

      - name: Build release APK
        working-directory: packages/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename and locate APK
        id: apk
        working-directory: packages/mobile/android/app/build/outputs/apk/release
        run: |
          APK_NAME="smart-files-v${{ steps.version.outputs.version }}.apk"
          mv app-release.apk "$APK_NAME"
          echo "name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "path=$PWD/$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          tag_name: ${{ github.event.inputs.tag_name || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
