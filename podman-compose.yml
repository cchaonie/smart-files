services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartfiles
    volumes:
      # 使用 bind mount 将数据保存到宿主机，便于备份和迁移
      # :Z 标签用于 SELinux 环境
      - ./data/postgres:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/smartfiles?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-change-me-generate-a-long-random-string-for-production}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      UPLOAD_ROOT: /data/storage
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-524288000}
    volumes:
      # 上传文件使用 bind mount，便于备份和迁移
      - ./data/storage:/data/storage:Z
    depends_on:
      - db
    # 延长启动等待时间，确保数据库就绪
    restart: unless-stopped
